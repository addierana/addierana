<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Form</title>
</head>

<body>
    <form action="" method="get">
        <fieldset>
            <legend>Title</legend>
            <label for="name">Enter Your Name:</label><br />
            <input type="text" id="name" name="name" /> <br />
            <hr />
            <label for="age">Age Group:</label><br />

            <input type="radio" id="m" name="age" value="0-10" />
            <label for="m">0-10</label>
            <input type="radio" id="n" name="age" value="11-20" />
            <label for="n">11-20</label>
            <input type="radio" id="o" name="age" value="21-30" />
            <label for="o">21-30</label>
            <input type="radio" id="p" name="age" value="31-40" />
            <label for="p">31-40</label> <br />
            <hr />
            <label>Select District:</label>
            <select name="dist">
                <option value="d">Dehradun</option>
                <option value="u">UttarKashi</option>
                <option value="t">Tehri-Garhwal</option>
                <option value="p">Pauri-Garhwal</option>
            </select>

            <input type="submit" value="Submit Form" /><br />
            <input type="reset" value="Reset" />
        </fieldset>
    </form>
</body>

</html>
