<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Course Details</title>
</head>

<body>
    <form action="" method="get">
        <fieldset>
            <legend>Title</legend>
            <label for="name">Enter Your Name:</label><br />
            <input type="text" id="name" name="name" required="required" /> <br />
            <hr />
            <label for="roll">Enter Your Roll Number:</label><br />
            <input type="text" id="roll" name="roll" required="required" /> <br />
            <hr />

            <textarea name="add">Additional Comments:</textarea>
            <input type="submit" value="Submit" /><br />
            <input type="reset" value="Reset" />
            <hr />
            <label>Course Registration</label>
            <select name="course">
                <option value="i">IT</option>
                <option value="c">CSE</option>
                <option value="e">ECE</option>
                <option value="m">ME</option>
            </select>
            <input type="submit" value="Submit" />
            <input type="reset" value="Reset" />

        </fieldset>
    </form>
</body>

</html>
