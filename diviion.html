<!DOCTYPE html>
<html>

<head>
    <title>Four Divisions</title>

    <style>
        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            gap: 20px;
        }

        .box {
            border: 2px solid black;
            margin: 10px;
            padding: 20px;
            background-color: lightblue;
            text-align: center;
        }
    </style>

</head>

<body>

    <div class="container">

        <div class="box">Division 1</div>
        <div class="box">Division 2</div>
        <div class="box">Division 3</div>
        <div class="box">Division 4</div>

    </div>

</body>

</html>
