<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Student Registration</title>
</head>

<body>
    <form action="" method="get">
        <fieldset>
            <legend>Title</legend>
            <label for="name">Enter Your Name:</label><br />
            <input type="text" id="name" name="name" /> <br />
            <hr />
            <label for="roll">Enter Your Roll Number:</label><br />
            <input type="text" id="roll" name="roll" /> <br />
            <hr />
            <label for="age">Department:</label><br />
            <input type="radio" id="cs" name="age" value="cs" />
            <label for="cs">Comp-Sci</label>
            <input type="radio" id="it" name="age" value="it" />
            <label for="it">Info-Tech</label> <br />
            <hr />
            <textarea name="add">Enter Your Address</textarea>
            <input type="submit" value="Submit" /><br />
            <input type="reset" value="Reset" />

        </fieldset>
    </form>
</body>

</html>
