<!DOCTYPE html>
<html>

<head>
    <title>Arithmetic Functions</title>

    <script>

        function add(a, b) {
            return a + b;
        }

        function sub(a, b) {
            return a - b;
        }

        function mul(a, b) {
            return a * b;
        }

        function div(a, b) {
            return a / b;
        }

    </script>

</head>

<body>

    <script>

        let x = 20;
        let y = 10;

        document.write("Addition = " + add(x, y) + "<br>");
        document.write("Subtraction = " + sub(x, y) + "<br>");
        document.write("Multiplication = " + mul(x, y) + "<br>");
        document.write("Division = " + div(x, y));

    </script>

</body>

</html>
