<!DOCTYPE html>
<html>

<head>
    <title>Target Attribute Example</title>
</head>

<body>

    <h2>_blank</h2>
    <a href="https://www.google.com" target="_blank">Open Google in New Tab</a>

    <br><br>

    <h2>_self</h2>
    <a href="https://www.wikipedia.org" target="_self">Open in Same Page</a>

    <br><br>

    <h2>_parent</h2>
    <a href="https://www.yahoo.com" target="_parent">Open in Parent Frame</a>

</body>

</html>
