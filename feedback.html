<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Student Feedback</title>
</head>

<body>
    <form action="" method="get">
        <fieldset>
            <legend>Title</legend>
            <label for="name">Enter Your Name:</label><br />
            <input type="text" id="name" name="name" /> <br />
            <hr />
            <label for="sub">Enter Subject:</label><br />
            <input type="text" id="sub" name="sub" /> <br />
            <hr />
            <label for="g">Gender:</label><br />
            <input type="radio" id="m" name="g" value="m" />
            <label for="m">Male</label>
            <input type="radio" id="f" name="g" value="f" />
            <label for="f">Female</label> <br />
            <hr />
            <label for="t">Feedback Type:</label><br />
            <input type="radio" id="t" name="t" value="p" />
            <label for="t">Positive</label>
            <input type="radio" id="p" name="t" value="n" />
            <label for="p">Negative</label> <br />

            <textarea name="add">Detailed Feedback:</textarea>
            <input type="submit" value="Submit" /><br />
            <input type="reset" value="Reset" />
        </fieldset>
    </form>
</body>

</html>
